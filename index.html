<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Carte The Ant Underground Kingdom</title>

  <!-- LEAFLET -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- MARKER CLUSTER -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <!-- TON CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Interactive map - 1157</h1>

<div id="container">

  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDEBAR -->
  <div id="sidebar" class="collapsed">

    <div id="sidebarHandle">
      <div id="sidebarBar"></div>
    </div>

    <h2>Inactive ant colonies</h2>

    <input
      type="text"
      id="searchInput"
      placeholder="Search colony..."
    >

    <div id="locationList">

      <div class="category">
        <h3 class="categoryTitle">Haut</h3>
        <ul id="topList"></ul>
      </div>

      <div class="category">
        <h3 class="categoryTitle">Bas</h3>
        <ul id="bottomList"></ul>
      </div>

      <div class="category">
        <h3 class="categoryTitle">Gauche</h3>
        <ul id="leftList"></ul>
      </div>

      <div class="category">
        <h3 class="categoryTitle">Droite</h3>
        <ul id="rightList"></ul>
      </div>

    </div>

  </div>

</div>

<div id="markerModal">

  <div id="markerBox">

    <h2>Ajouter un nouveau marker</h2>

    <label>Nom du marker :</label>
    <input type="text" id="markerName" placeholder="Nom..." />

    <h3>Insérez les coordonnées :</h3>

    <label>X :</label>
    <input type="number" id="markerX" min="0" max="1200" />

    <label>Y :</label>
    <input type="number" id="markerY" min="0" max="1200" />

    <h3>Code généré :</h3>

    <pre id="generatedCode"></pre>

    <div id="markerButtons">

      <button id="cancelMarkerBtn">Annuler</button>
      <button id="copyCodeBtn">📋 Copier le code</button>
      <button id="addMarkerBtn">Ajouter</button>

    </div>

  </div>

</div>

<!-- SCRIPTS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- TON JS -->
<script src="script.js"></script>

</body>
</html>
