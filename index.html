<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Carte The Ant Underground Kingdom</title>

  <!-- LEAFLET -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- MARKER CLUSTER -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <!-- TON CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Interactive map - 1157</h1>

<div id="container">

  <!-- MAP -->
  <div id="map"></div>

 <div id="sidebar" class="collapsed">

  <div id="sidebarHandle">
    <div id="sidebarBar"></div>
  </div>
    <h2>Inactive ant colonies</h2>

    <!-- SEARCH -->
    <input
      type="text"
      id="searchInput"
      placeholder="Search colony..."
    >

    <!-- LIST -->
    <div id="locationList">

      <!-- HAUT -->
      <div class="category">

        <h3 class="categoryTitle">
          Haut
        </h3>

        <ul id="topList"></ul>

      </div>

      <!-- BAS -->
      <div class="category">

        <h3 class="categoryTitle">
          Bas
        </h3>

        <ul id="bottomList"></ul>

      </div>

      <!-- GAUCHE -->
      <div class="category">

        <h3 class="categoryTitle">
          Gauche
        </h3>

        <ul id="leftList"></ul>

      </div>

      <!-- DROITE -->
      <div class="category">

        <h3 class="categoryTitle">
          Droite
        </h3>

        <ul id="rightList"></ul>

      </div>

    </div>

  </div>

</div>

<div id="markerModal" class="modal">
  <div class="modal-content">

    <h2>Ajouter un nouveau marker</h2>

    <label>Nom du marker :</label>
    <input type="text" id="markerName" placeholder="Ex: zone de spawn">

    <h3>Insérez les coordonnées :</h3>

    <label>X :</label>
    <input type="number" id="coordX" min="0" max="1200">

    <label>Y :</label>
    <input type="number" id="coordY" min="0" max="1200">

    <button onclick="addMarker()">Ajouter</button>
    <button onclick="closeModal()">Annuler</button>

  </div>
</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- MARKER CLUSTER -->
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<!-- TON JS -->
<script src="script.js"></script>

</body>
</html>
