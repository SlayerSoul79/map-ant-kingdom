<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte The Ant Underground Kingdom</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Carte The Ant Underground Kingdom</title>
</head>

<body>

<h1>Interactive map - 1157</h1>

<div id="container">

  <div id="map"></div>

<div id="coords">
  X: 0 | Y: 0
</div>

  <div id="sidebar">
    <h2>Inactive ant colonies</h2>

    <input
  type="text"
  id="searchInput"
  placeholder="Search colony..."
>

    <div id="locationList">

  <div class="category">

    <h3 class="categoryTitle">Haut</h3>

    <ul id="topList"></ul>

  </div>

  <div class="category">

    <h3 class="categoryTitle">Bas</h3>

    <ul id="bottomList"></ul>

  </div>

  <div class="category">

    <h3 class="categoryTitle">Gauche</h3>

    <ul id="leftList"></ul>

  </div>

  <div class="category">

    <h3 class="categoryTitle">Droite</h3>

    <ul id="rightList"></ul>

  </div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
