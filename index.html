<!DOCTYPE html>
<html lang="fr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Carte The Ant Underground Kingdom</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- Marker Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1>Interactive map - 1157</h1>

  <div id="container">

    <!-- MAP -->
    <div id="map"></div>

    <!-- SIDEBAR -->
    <div id="sidebar">

      <!-- HANDLE MOBILE -->
      <div id="sidebarHandle">
        <div id="sidebarBar"></div>
      </div>

      <h2>Inactive ant colonies</h2>

      <!-- SEARCH -->
      <input
        type="text"
        id="searchInput"
        placeholder="Search colony..."
      >

      <!-- LIST -->
      <div id="locationList">

        <!-- TOP -->
        <div class="category">
          <h3 class="categoryTitle">Haut</h3>
          <ul id="topList"></ul>
        </div>

        <!-- BOTTOM -->
        <div class="category">
          <h3 class="categoryTitle">Bas</h3>
          <ul id="bottomList"></ul>
        </div>

        <!-- LEFT -->
        <div class="category">
          <h3 class="categoryTitle">Gauche</h3>
          <ul id="leftList"></ul>
        </div>

        <!-- RIGHT -->
        <div class="category">
          <h3 class="categoryTitle">Droite</h3>
          <ul id="rightList"></ul>
        </div>

      </div>

    </div>

  </div>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Marker Cluster -->
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
